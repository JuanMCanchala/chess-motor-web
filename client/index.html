<!DOCTYPE html>
<html lang="es" data-tab="play">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KallpaModulo</title>

  <!-- Chessground (servido desde /chessground/ por el servidor) -->
  <link rel="stylesheet" href="/chessground/assets/chessground.base.css" />
  <link rel="stylesheet" href="/chessground/assets/chessground.cburnett.css" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════ HEADER ═══════════════ -->
<header>
  <div class="brand">
    <span class="brand-k">K</span>allpaModulo
    <span class="version">C++ v8</span>
  </div>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="play">Jugar</button>
    <button class="tab-btn"        data-tab="analysis">Análisis</button>
  </nav>
  <div class="status-wrap">
    <span id="status-dot" class="dot disconnected"></span>
    <span id="status-label">Conectando…</span>
  </div>
</header>

<!-- ═══════════════ PLAY TAB ═══════════════ -->
<main id="tab-play" class="tab-content active">
  <div class="play-layout">

    <!-- Eval bar -->
    <div class="eval-bar-wrap">
      <div id="eval-bar">
        <div id="eval-fill"></div>
        <span id="eval-label">0.0</span>
      </div>
    </div>

    <!-- Board -->
    <div class="board-zone">
      <!-- Coordenadas superiores -->
      <div class="coords coords-top" id="play-coords-top"></div>
      <div class="board-row">
        <div class="coords coords-left" id="play-coords-left"></div>
        <div class="board-wrap" id="play-board-wrap">
          <div id="play-board"></div>
        </div>
        <div class="coords coords-right" id="play-coords-right" style="display:none"></div>
      </div>
      <div class="coords coords-bottom" id="play-coords-bottom"></div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">

      <!-- Settings (visible antes de la partida) -->
      <div class="settings-panel" id="play-settings">
        <h3>Nueva partida</h3>
        <label>Color
          <select id="sel-color">
            <option value="white">Blancas</option>
            <option value="black">Negras</option>
            <option value="random">Aleatorio</option>
          </select>
        </label>
        <label>Tiempo del motor
          <select id="sel-time">
            <option value="0.5">0.5 s (fácil)</option>
            <option value="1">1 s</option>
            <option value="3" selected>3 s</option>
            <option value="5">5 s</option>
            <option value="10">10 s (difícil)</option>
          </select>
        </label>
        <button class="btn btn-primary btn-full" id="btn-new">▶ Iniciar</button>
      </div>

      <!-- Historial -->
      <div class="move-history-wrap" id="move-history-wrap" style="display:none">
        <div class="move-history" id="move-history"></div>
      </div>

      <!-- Controles durante la partida -->
      <div class="game-controls" id="game-controls" style="display:none">
        <button class="btn" id="btn-undo">↩ Deshacer</button>
        <button class="btn btn-danger" id="btn-resign">✕ Rendirse</button>
        <button class="btn btn-secondary" id="btn-new-again">+ Nueva</button>
      </div>

      <!-- Mensaje de resultado -->
      <div class="result-banner" id="result-banner" style="display:none"></div>

      <!-- Info del motor -->
      <div class="engine-info" id="engine-info" style="display:none">
        <div class="info-row"><span>Profundidad</span><span id="info-depth">—</span></div>
        <div class="info-row"><span>Nodos</span><span id="info-nodes">—</span></div>
        <div class="info-row"><span>NPS</span><span id="info-nps">—</span></div>
      </div>

    </aside>
  </div>
</main>

<!-- ═══════════════ ANALYSIS TAB ═══════════════ -->
<main id="tab-analysis" class="tab-content">
  <div class="analysis-layout">

    <!-- Board -->
    <div class="board-zone">
      <div class="board-wrap" id="analysis-board-wrap">
        <div id="analysis-board"></div>
      </div>
    </div>

    <!-- Panel de análisis -->
    <aside class="analysis-panel">

      <div class="fen-input-wrap">
        <label for="fen-input">FEN</label>
        <input id="fen-input" type="text"
               placeholder="Posición inicial o pega un FEN…"
               spellcheck="false" />
        <button class="btn btn-secondary btn-sm" id="btn-load-fen">Cargar</button>
      </div>

      <div class="analysis-controls">
        <button class="btn btn-primary" id="btn-analyze">▶ Analizar</button>
        <button class="btn btn-danger"  id="btn-stop-analysis" style="display:none">■ Parar</button>
        <label class="time-label">
          Tiempo:
          <select id="sel-analysis-time">
            <option value="5">5 s</option>
            <option value="10" selected>10 s</option>
            <option value="30">30 s</option>
            <option value="60">60 s</option>
          </select>
        </label>
      </div>

      <!-- Mejor jugada / score actual -->
      <div class="best-move-box" id="best-move-box" style="display:none">
        <div class="bm-row">
          <span class="bm-label">Mejor jugada</span>
          <span id="bm-move" class="bm-value">—</span>
        </div>
        <div class="bm-row">
          <span class="bm-label">Evaluación</span>
          <span id="bm-score" class="bm-value">—</span>
        </div>
        <div class="bm-row">
          <span class="bm-label">Profundidad</span>
          <span id="bm-depth" class="bm-value">—</span>
        </div>
        <div class="pv-wrap">
          <span class="bm-label">Línea</span>
          <span id="bm-pv" class="pv-text">—</span>
        </div>
      </div>

      <!-- Tabla de profundidades -->
      <div class="depth-table-wrap" id="depth-table-wrap" style="display:none">
        <table class="depth-table">
          <thead>
            <tr><th>Prof.</th><th>Score</th><th>Nodos</th><th>Línea</th></tr>
          </thead>
          <tbody id="depth-table-body"></tbody>
        </table>
      </div>

    </aside>
  </div>
</main>

<!-- ═══════════════ PROMOTION MODAL ═══════════════ -->
<div id="promo-modal" style="display:none">
  <div class="promo-box">
    <p>Promocionar a:</p>
    <div class="promo-pieces" id="promo-pieces"></div>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
